<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registrar Venta</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Registrar Venta</h1>
        <!-- Mensaje de éxito simulado con JavaScript -->
        <div id="mensaje" class="alert" style="display: none;">Venta registrada con éxito.</div>

        <form onsubmit="mostrarMensaje(event)">
            <label for="producto">Producto:</label>
            <input type="text" id="producto" name="producto" required>
            
            <label for="cantidad">Cantidad:</label>
            <input type="number" id="cantidad" name="cantidad" min="1" required>
            
            <label for="precio">Precio Unitario:</label>
            <input type="number" id="precio" name="precio" step="0.01" min="0.01" required>
            
            <button type="submit">Guardar Venta</button>
        </form>
        <a href="index.html" class="back-link">Volver al Inicio</a>
    </div>

    <script>
        function mostrarMensaje(event) {
            event.preventDefault(); // Evita que la página se recargue
            document.getElementById('mensaje').style.display = 'block';
            event.target.reset(); // Limpia el formulario
        }
    </script>
</body>
</html>
